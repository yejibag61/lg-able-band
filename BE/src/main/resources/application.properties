spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
spring.application.name=lg-able-band-backend
server.port=8080
emergency.ai.enabled=${EMERGENCY_AI_ENABLED:true}
emergency.ai.base-url=${EMERGENCY_AI_BASE_URL:http://127.0.0.1:8003}
emergency.ai.connect-timeout-ms=${EMERGENCY_AI_CONNECT_TIMEOUT_MS:1000}
emergency.ai.read-timeout-ms=${EMERGENCY_AI_READ_TIMEOUT_MS:3000}
ml.sound-chatbot.base-url=${SOUND_CHATBOT_BASE_URL:http://127.0.0.1:8002}
ml.sound-chatbot.connect-timeout-ms=${SOUND_CHATBOT_CONNECT_TIMEOUT_MS:1000}
ml.sound-chatbot.timeout-ms=${SOUND_CHATBOT_TIMEOUT_MS:5000}
ml.info-agent.base-url=${INFO_AGENT_BASE_URL:http://127.0.0.1:8004}
ml.info-agent.connect-timeout-ms=${INFO_AGENT_CONNECT_TIMEOUT_MS:1000}
ml.info-agent.timeout-ms=${INFO_AGENT_TIMEOUT_MS:30000}
app.emergency.cooldown-seconds=${APP_EMERGENCY_COOLDOWN_SECONDS:10}
db.host=${DB_HOST:}
db.port=${DB_PORT:}
db.name=${DB_NAME:}
db.user=${DB_USER:}
db.password=${DB_PASSWORD:}
